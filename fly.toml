app = "scribe-nc"
primary_region = "ord"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3748"
  GLOSS_URL = "https://gloss-nc.fly.dev"
  SCRIBE_OWNER_EMAIL = "nathan@local"

[http_service]
  internal_port = 3748
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[mounts]]
  source = "scribe_data"
  destination = "/app/data"

[[vm]]
  memory_mb = 1024
  cpu_kind = "shared"
  cpus = 1

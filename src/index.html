<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7a4a2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Scribe" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Scribe</title>
    <link rel="stylesheet" href="/styles.css" />
    <script>window.__SUITE_CURRENT__ = 'scribe';</script>
    <script src="https://maestro-nc.fly.dev/suite-switcher.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    <script>
      // Register the SW only in production builds served over HTTPS (or on
      // localhost). Vite's dev server reloads modules aggressively; an active
      // SW caching /index.html there would fight HMR.
      if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.warn('[sw] registration failed', err);
          });
        });
      }
    </script>
  </body>
</html>
